name: exha_v2
services:
  exha-app:
    depends_on:
      exha-db:
        condition: service_healthy
    build: ./
    volumes:
      - ./src:/usr/src/app/src
    ports:
      - '8080:8080'
    command: sh -c "npx prisma db push && npx prisma generate && pnpm start:dev"
    env_file:
      - .env
    environment:
      - PORT=${PORT}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - DATABASE_URL=postgresql://postgres:123456+@exha-db:5432/exhadb

  exha-db:
    container_name: exha-db
    image: postgres:latest
    restart: always
    volumes:
      - ./postgres:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - '5430:5432'
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres:
